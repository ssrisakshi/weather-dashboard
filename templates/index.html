<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Weather Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container-fluid weather-app">
        <!-- Navigation -->
        <nav class="navbar navbar-dark bg-dark navbar-expand-lg sticky-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <i class="bi bi-cloud-sun"></i> Weather Dashboard
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#settingsModal">
                                <i class="bi bi-gear"></i> Settings
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container mt-4">
                <!-- Search Section -->
                <div class="row mb-4">
                    <div class="col-lg-8 mx-auto">
                        <div class="search-card card shadow-sm">
                            <div class="card-body">
                                <div class="input-group">
                                    <input type="text" class="form-control form-control-lg" 
                                           id="cityInput" placeholder="Search for a city..." 
                                           autocomplete="off">
                                    <button class="btn btn-primary" type="button" id="searchBtn">
                                        <i class="bi bi-search"></i> Search
                                    </button>
                                    <button class="btn btn-outline-secondary" type="button" id="locationBtn">
                                        <i class="bi bi-geo-alt"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Alerts -->
                <div id="alertsContainer" class="row mb-4"></div>

                <!-- Current Weather -->
                <div id="weatherContainer" class="row mb-4"></div>

                <!-- Weather Details -->
                <div id="detailsContainer" class="row mb-4"></div>

                <!-- Hourly Forecast -->
                <div id="hourlyForecastContainer" class="row mb-4"></div>

                <!-- 5-Day Forecast -->
                <div id="forecastContainer" class="row mb-4"></div>

                <!-- Favorites and History -->
                <div class="row mb-4">
                    <div class="col-lg-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-primary text-white">
                                <h5><i class="bi bi-star"></i> Favorite Cities</h5>
                            </div>
                            <div class="card-body">
                                <div id="favoritesList" class="favorites-list"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="card shadow-sm">
                            <div class="card-header bg-success text-white">
                                <h5><i class="bi bi-clock-history"></i> Recent Searches</h5>
                            </div>
                            <div class="card-body">
                                <div id="historyList" class="history-list"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Settings Modal -->
        <div class="modal fade" id="settingsModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Settings</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="tempToggle" checked>
                            <label class="form-check-label" for="tempToggle">
                                Celsius (°C)
                            </label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="darkModeToggle">
                            <label class="form-check-label" for="darkModeToggle">
                                Dark Mode
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="spinner-container d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
